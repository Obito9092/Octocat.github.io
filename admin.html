<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login Panel</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .container { max-width: 400px; margin: auto; padding: 20px; border: 1px solid #ccc; }
        h2 { text-align: center; }
        input[type='text'], input[type='password'], input[type='file'] { width: 100%; padding: 10px; margin: 10px 0; }
        input[type='submit'] { width: 100%; background-color: #4CAF50; color: white; padding: 10px; border: none; }
        input[type='submit']:hover { background-color: #45a049; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Admin Login</h2>
        <form action="#" method="post">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>
            <input type="submit" value="Login">
        </form>
        <h2>Upload Video</h2>
        <form action="#" method="post" enctype="multipart/form-data">
            <label for="video">Select Video:</label>
            <input type="file" id="video" name="video" accept="video/*" required>
            <input type="submit" value="Upload Video">
        </form>
    </div>
</body>
</html>
